- name: Setup Android NDK
        run: |
          # Kita tetap deteksi NDK, tapi pastikan path-nya benar untuk gomobile
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      - name: Install & Force Bind Source
        run: |
          # Pindah ke folder android karena go.mod ada di sana
          cd android
          # Jika go.mod belum ada, inisialisasi agar tidak error "cannot find main module"
          go mod init goapk || true 
          go mod tidy
          
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          go get golang.org/x/mobile/bind
          go get golang.org/x/mobile/app
          
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          export ANDROID_NDK_HOME=${{ env.NDK_PATH }}
          
          # Jalankan gomobile init
          $(go env GOPATH)/bin/gomobile init
          
          # Tetap pakai format Anda: masuk ke folder lalu build
          cd android
          
          # Menggunakan perintah build Anda dengan penyesuaian path output
          # Flag -target=android tetap digunakan sesuai permintaan Anda
          $(go env GOPATH)/bin/gomobile build -v -target=android -o ../tunnel-proyek.apk .
